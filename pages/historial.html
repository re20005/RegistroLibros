<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Historial de Préstamos</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link rel="stylesheet"
          href="../css/styles.css">

</head>

<body>

<nav class="navbar navbar-expand-lg custom-navbar">

    <div class="container-fluid">

        <a class="navbar-brand"
           href="home.html">

            <i class="fa-solid fa-book"></i>
            Biblioteca Virtual

        </a>

        <span id="usuarioActivo"
              class="nav-link d-inline">
        </span>

        <div>
            <a href="#"  class="nav-link d-inline cerrar-sesion-bnt"> Cerrar Sesión </a>

        </div>

    </div>

</nav>

<section class="home-box py-5">
    <div class="overlay"></div>
    <div class="container position-relative z-index-5 text-center text-white">
        <header class="mb-5">
            <h1>Historial de Préstamos</h1>
            <p>Consulta todos tus movimientos.</p>
        </header>
        <div class="card p-4 bg-white text-dark shadow rounded-4 text-start">
            <h4 class="mb-4 border-bottom pb-2">Mis Movimientos</h4>
            <ul id="listaHistorial" class="list-group list-group-flush"></ul>
        </div>
    </div>
</section>

<script src="../js/auth.js"></script>
<script src="../js/Libros.js"></script>
<script src="../js/prestamos.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", () => {

        const sesion = auth.validarSesion();

        document.getElementById("usuarioActivo").textContent =
            `${sesion.nombre} - ${sesion.correo}`;

        const historial = Prestamos.obtenerHistorialUsuario(sesion.correo);
        const lista = document.getElementById("listaHistorial");
        lista.innerHTML = "";

        if (historial.length === 0) {
            lista.innerHTML = `
                <li class="list-group-item">
                    No tienes movimientos registrados.
                </li>`;
            return;
        }

        [...historial].reverse().forEach(entrada => {
    const esPrestado = entrada.evento === "prestado";
    const item = document.createElement("li");
    item.className = "list-group-item d-flex justify-content-between align-items-center p-3 mb-2 border rounded";
    item.innerHTML = `
        <div class="me-auto">
            <div class="fw-bold">${entrada.titulo}</div>
            <div class="small text-muted">ISBN: ${entrada.isbn}</div>
            <div class="small">Fecha: ${entrada.fecha}</div>
        </div>
        <span class="badge ${esPrestado ? "bg-warning text-dark" : "bg-success"}">
            ${esPrestado ? "Prestado" : "Devuelto"}
        </span>
    `;
    lista.appendChild(item);
});

        const logout = document.querySelector(".cerrar-sesion-bnt");
        if (logout) {
            logout.addEventListener("click", e => {
                e.preventDefault();
                auth.cerrarSesion();
                window.location.href = "login.html";
            });
        }

    });
</script>

</body>

</html>
