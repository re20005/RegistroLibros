<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Home Gestión de Libros</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link rel="stylesheet" href="../css/styles.css">
</head>

<body>

    
    <nav class="navbar navbar-expand-lg custom-navbar">

        <div class="container-fluid">

            <a class="navbar-brand" href="#">
                <i class="fa-solid fa-book"></i>
                Biblioteca Virtual
            </a>

            
                <span id="usuarioActivo" class="nav-link d-inline"></span>               
          
             
            <div>

                <a href="#" class="nav-link d-inline cerrar-sesion-bnt">
                    Cerrar Sesión
                </a>

            </div>

        </div>

    </nav>

    <section class="home-box">
        <div class="overlay"></div>
        <div class="home">
            <h1>Sistema de Gestión de Libros</h1>
            <p>Bienvenido a tu biblioteca virtual. Aquí puedes gestionar tu colección y ver estadísticas en tiempo real.</p>

            <!-- 📊 Dashboard (Web Worker) -->
            <div class="row g-3 mb-4">
                <div class="col-md-3">
                    <div class="card bg-dark text-white text-center p-3 border-light">
                        <h6>Total Libros</h6>
                        <h2 id="totalLibrosHome">0</h2>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card bg-success text-white text-center p-3 border-light">
                        <h6>Disponibles</h6>
                        <h2 id="totalDisponiblesHome">0</h2>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card bg-warning text-dark text-center p-3 border-light">
                        <h6>Prestados</h6>
                        <h2 id="totalPrestadosHome">0</h2>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card bg-info text-dark text-center p-3 border-light">
                        <h6>Bibliotecas</h6>
                        <h2 id="totalBibliotecasHome">0</h2>
                    </div>
                </div>
            </div>

            <!-- 📚 Gestión de Libros (CRUD) -->
            <div class="row">
                <!-- Formulario -->
                <div class="col-md-5">
                    <div class="card p-3 shadow-lg">
                        <h4 id="formTitle">Registrar Libro</h4>
                        <form id="formLibro">
                            <input type="hidden" id="isbnOriginal">
                            <div class="mb-2">
                                <input type="text" id="titulo" class="form-control" placeholder="Título" required>
                            </div>
                            <div class="mb-2">
                                <input type="text" id="autor" class="form-control" placeholder="Autor" required>
                            </div>
                            <div class="mb-2">
                                <input type="text" id="isbn" class="form-control" placeholder="ISBN" required>
                            </div>
                            <div class="mb-2">
                                <input type="text" id="biblioteca" class="form-control" placeholder="Biblioteca" required>
                            </div>
                            <div class="mb-2">
                                <select id="estado" class="form-control">
                                    <option value="disponible">Disponible</option>
                                    <option value="prestado">Prestado</option>
                                </select>
                            </div>
                            <div class="d-grid gap-2">
                                <button type="submit" id="btnGuardarLibro" class="btn btn-primary">Guardar Libro</button>
                                <button type="button" id="btnLimpiarLibro" class="btn btn-secondary">Limpiar</button>
                            </div>
                        </form>
                    </div>
                </div>
                <!-- Lista -->
                <div class="col-md-7">
                    <div class="card p-3 shadow-lg" style="max-height: 500px; overflow-y: auto;">
                        <h4>Mi Colección</h4>
                        <ul id="listaLibros" class="list-group list-group-flush">
                            <!-- Los libros se cargarán aquí -->
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/biblioteca.js"></script>
    <script src="../js/libros.js"></script>
    <script src="../js/home.js"></script>
    <script src="../js/librosUI.js"></script>
    <script>
        // Inicializar eventos de UI
        document.addEventListener("DOMContentLoaded", () => {
            if (typeof LibrosUI !== "undefined") {
                LibrosUI.configurarEventos();
            }
        });
    </script>
</body>

</html>
