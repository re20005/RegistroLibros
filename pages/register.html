<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Registro de Usuario</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link rel="stylesheet" href="../css/styles.css">

</head>


<body>
    <!-- Encabezado -->
    <nav class="navbar navbar-expand-lg custom-navbar">

        <div class="container-fluid">

            <a class="navbar-brand" href="../index.html">
                <i class="fa-solid fa-book"></i>
                Biblioteca Virtual
            </a>

            <div>

                <a href="/pages/login.html" class="nav-link d-inline login-bnt">
                    Iniciar Sesión
                </a>

            </div>

        </div>

    </nav>


    <section class="register-box">

        <div class="overlay"></div>

        <div class="register">

            <h1>
                Registro de Usuario
            </h1>

            <p>
                Con tu cuenta podras acceder a una amplia variedad de libros.
            </p>
            <form id="formRegistro">
                <div class="input-box">

                    <i class="fa-solid fa-user input-icon"></i>

                    <input type="text" id="nombre" placeholder="Nombre Completo">

                </div>

                <div class="input-box">

                    <i class="fa-solid fa-envelope input-icon"></i>

                    <input type="email" id="correo" placeholder="Email">

                </div>

                <div class="input-box">

                    <i class="fa-solid fa-lock input-icon"></i>

                    <input type="password" id="password" placeholder="contraseña">

                </div>

                <div class="input-box">

                    <i class="fa-solid fa-lock input-icon"></i>

                    <input type="password" id="cpassword" placeholder="Confirma contraseña">

                </div>

                <div class="buttons-container">
                    <button type="button" class="btn btn-primary" id="btnLimpiar">Limpiar</button>
                    <button type="submit" class="btn btn-warning">Registrar</button>
                </div>
            </form>



        </div>

    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js">
    </script>
    <script src="../js/users.js"></script>
    <script src="../js/register.js"></script>

</body>

</html>
